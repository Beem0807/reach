AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: reach backend

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    CodeUri: ../../backend
    Environment:
      Variables:
        TOKEN_PEPPER: !Ref TokenPepper
        ADMIN_TOKEN: !Ref AdminToken
        STORAGE_BACKEND: dynamo
        RELEASES_S3_BASE: !Ref ReleasesS3Base

Parameters:
  TokenPepper:
    Type: String
    NoEcho: true
    Description: Server-side HMAC pepper for token hashing
  AdminToken:
    Type: String
    NoEcho: true
    Description: Bearer token for admin API endpoints (bootstrap, policy management)
  ReleasesS3Base:
    Type: String
    Default: "https://reach-releases.s3.amazonaws.com"
    Description: Base URL for agent binary downloads (override if self-hosting binaries)

Resources:
  # -----------------------------------------------------------------------
  # DynamoDB tables
  # -----------------------------------------------------------------------
  AgentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-agents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
      KeySchema:
        - AttributeName: agent_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: tenant-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  TenantTokensTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-tenant-tokens
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token_hash
          AttributeType: S
      KeySchema:
        - AttributeName: token_hash
          KeyType: HASH

  JobsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: agent-status-index
          KeySchema:
            - AttributeName: agent_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: tenant-history-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # -----------------------------------------------------------------------
  # Shared IAM role — all Lambda functions use this
  # -----------------------------------------------------------------------
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: reach-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: reach-dynamodb
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: dynamodb:*
                Resource:
                  - !GetAtt AgentsTable.Arn
                  - !GetAtt TenantTokensTable.Arn
                  - !GetAtt JobsTable.Arn
                  - !Sub "${AgentsTable.Arn}/index/*"
                  - !Sub "${JobsTable.Arn}/index/*"

  # -----------------------------------------------------------------------
  # Agent endpoints
  # -----------------------------------------------------------------------
  AgentClaimFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-agent-claim
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.agent_claim.agent_claim_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agent/claim
            Method: POST

  AgentSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-agent-sync
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.agent_sync.agent_sync_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agent/sync
            Method: POST

  AgentJobResultFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-agent-job-result
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.agent_job_result.agent_job_result_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agent/jobs/{job_id}/result
            Method: POST

  # -----------------------------------------------------------------------
  # Tenant (CLI) endpoints
  # -----------------------------------------------------------------------
  CreateJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-create-job
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.create_job.create_job_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /jobs
            Method: POST

  ListJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-list-jobs
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.list_jobs.list_jobs_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /jobs
            Method: GET

  GetJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-get-job
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.get_job.get_job_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /jobs/{job_id}
            Method: GET

  ListAgentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-list-agents
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.list_agents.list_agents_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agents
            Method: GET

  GetAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-get-agent
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.get_agent.get_agent_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agents/{agent_id}
            Method: GET

  # -----------------------------------------------------------------------
  # Admin endpoints — protected by TOKEN_PEPPER
  # -----------------------------------------------------------------------
  AdminBootstrapFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-bootstrap
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_bootstrap.admin_bootstrap_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/bootstrap
            Method: POST

  AdminGetPolicyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-get-policy
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_policy.get_policy_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents/{agent_id}/policy
            Method: GET

  AdminSetModeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-set-mode
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_policy.set_mode_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents/{agent_id}/policy/mode
            Method: PUT

  AdminAddCommandFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-add-command
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_policy.add_command_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents/{agent_id}/policy/commands
            Method: POST

  AdminRemoveCommandFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-remove-command
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_policy.remove_command_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents/{agent_id}/policy/commands
            Method: DELETE

  # -----------------------------------------------------------------------
  # Heartbeat checker — runs every 5 minutes
  # -----------------------------------------------------------------------
  HeartbeatCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-heartbeat-checker
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.heartbeat.heartbeat_handler
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Name: reach-heartbeat-check
            Description: Mark agents INACTIVE if no heartbeat in last 5 minutes

Outputs:
  ApiUrl:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
