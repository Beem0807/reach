      FunctionName: reach-tenant-get-user-agents
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.tenant_users.get_user_agents_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /tenant/users/{user_id}/agents
            Method: GET

  TenantSetUserAgentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-tenant-set-user-agents
