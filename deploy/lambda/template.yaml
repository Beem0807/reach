      Handler: handlers.heartbeat.heartbeat_handler
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Name: reach-heartbeat-check
            Description: Mark agents INACTIVE (45s gap); expire stale approvals hourly; purge old terminal approvals daily

  # -----------------------------------------------------------------------
  # UI: S3 bucket + CloudFront distribution
  # -----------------------------------------------------------------------
  AdminUiBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "reach-ui-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AdminUiBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AdminUiBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${AdminUiBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AdminUiDistribution}"

  AdminUiOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "reach-ui-oac-${AWS::StackName}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  UiPathRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "reach-ui-rewrite-${AWS::StackName}"
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite /ui and /ui/ to /ui/index.html for SPA entry point
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var uri = event.request.uri;
          if (uri === '/ui' || uri === '/ui/') {
            event.request.uri = '/ui/index.html';
          }
          return event.request;
        }

  AdminUiDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: AdminUiS3Origin
            DomainName: !GetAtt AdminUiBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref AdminUiOriginAccessControl
          - Id: ApiGatewayOrigin
            DomainName: !Sub "${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: ApiGatewayOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
          CachedMethods: [GET, HEAD]
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad       # CachingDisabled
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
        CacheBehaviors:
          - PathPattern: /ui*
            TargetOriginId: AdminUiS3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt UiPathRewriteFunction.FunctionARN

Outputs:
  ApiUrl:
    Description: API URL (via CloudFront)
    Value: !Sub "https://${AdminUiDistribution.DomainName}"

  AdminUiUrl:
    Description: UI URL (CloudFront /ui/)
    Value: !Sub "https://${AdminUiDistribution.DomainName}/ui/"

  AdminUiBucketName:
    Description: S3 bucket name for UI assets
    Value: !Ref AdminUiBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (for cache invalidations)
    Value: !Ref AdminUiDistribution
