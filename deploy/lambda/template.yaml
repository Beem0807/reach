AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: reach backend

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    CodeUri: ../../backend
    Environment:
      Variables:
        TOKEN_PEPPER: !Ref TokenPepper
        ADMIN_TOKEN: !Ref AdminToken
        STORAGE_BACKEND: dynamo
        RELEASES_S3_BASE: !Ref ReleasesS3Base

Parameters:
  TokenPepper:
    Type: String
    NoEcho: true
    Description: Server-side HMAC pepper for token hashing
  AdminToken:
    Type: String
    NoEcho: true
    Description: Bearer token for admin API endpoints (bootstrap, policy management)
  ReleasesS3Base:
    Type: String
    Default: "https://reach-releases.s3.amazonaws.com"
    Description: Base URL for agent binary downloads (override if self-hosting binaries)

Resources:
  # -----------------------------------------------------------------------
  # DynamoDB tables
  # -----------------------------------------------------------------------
  AgentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-agents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
      KeySchema:
        - AttributeName: agent_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: tenant-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  TenantsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-tenants
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH

  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: token_hash
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: token-hash-index
          KeySchema:
            - AttributeName: token_hash
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: tenant-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  JobsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: agent-status-index
          KeySchema:
            - AttributeName: agent_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: tenant-history-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  ApprovalsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-approvals
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: approval_id
          AttributeType: S
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: approval_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: agent-approvals-index
          KeySchema:
            - AttributeName: agent_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: tenant-approvals-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # -----------------------------------------------------------------------
  # Shared IAM role - all Lambda functions use this
  # -----------------------------------------------------------------------
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: reach-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: reach-dynamodb
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: dynamodb:*
                Resource:
                  - !GetAtt AgentsTable.Arn
                  - !GetAtt TenantsTable.Arn
                  - !GetAtt UsersTable.Arn
                  - !GetAtt JobsTable.Arn
                  - !GetAtt ApprovalsTable.Arn
                  - !Sub "${AgentsTable.Arn}/index/*"
                  - !Sub "${UsersTable.Arn}/index/*"
                  - !Sub "${JobsTable.Arn}/index/*"
                  - !Sub "${ApprovalsTable.Arn}/index/*"

  # -----------------------------------------------------------------------
  # Agent endpoints
  # -----------------------------------------------------------------------
  AgentClaimFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-agent-claim
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.agent_claim.agent_claim_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agent/claim
            Method: POST

  AgentSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-agent-sync
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.agent_sync.agent_sync_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agent/sync
            Method: POST

  AgentJobResultFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-agent-job-result
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.agent_job_result.agent_job_result_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agent/jobs/{job_id}/result
            Method: POST

  AgentRotateTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-agent-rotate-token
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.agent_rotate_token.agent_rotate_token_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agent/rotate-token
            Method: POST

  # -----------------------------------------------------------------------
  # Tenant (CLI) endpoints
  # -----------------------------------------------------------------------
  MeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-me
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.me.me_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /me
            Method: GET

  CreateJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-create-job
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.create_job.create_job_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /jobs
            Method: POST

  ListJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-list-jobs
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.list_jobs.list_jobs_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /jobs
            Method: GET

  GetJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-get-job
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.get_job.get_job_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /jobs/{job_id}
            Method: GET

  ListAgentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-list-agents
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.list_agents.list_agents_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agents
            Method: GET

  GetAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-get-agent
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.get_agent.get_agent_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agents/{agent_id}
            Method: GET

  ListMyPendingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-list-my-pending
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.tenant_approvals.list_my_pending_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /approvals/pending
            Method: GET

  ListAgentApprovedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-list-agent-approved
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.tenant_approvals.list_agent_approved_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agents/{agent_id}/approved-commands
            Method: GET

  # -----------------------------------------------------------------------
  # Admin endpoints - protected by ADMIN_TOKEN
  # -----------------------------------------------------------------------
  AdminCreateTenantFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-create-tenant
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_tenants.create_tenant_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants
            Method: POST

  AdminListTenantsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-list-tenants
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_tenants.list_tenants_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants
            Method: GET

  AdminCreateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-create-user
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_users.create_user_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants/{tenant_id}/users
            Method: POST

  AdminListUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-list-users
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_users.list_users_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants/{tenant_id}/users
            Method: GET

  AdminDeleteUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-delete-user
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_users.delete_user_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants/{tenant_id}/users/{user_id}
            Method: DELETE

  AdminRotateUserTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-rotate-user-token
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_users.rotate_user_token_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants/{tenant_id}/users/{user_id}/rotate-token
            Method: POST

  AdminGetUserAgentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-get-user-agents
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_users.get_user_agents_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants/{tenant_id}/users/{user_id}/agents
            Method: GET

  AdminSetUserAgentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-set-user-agents
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_users.set_user_agents_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants/{tenant_id}/users/{user_id}/agents
            Method: PUT

  AdminGrantAgentAccessFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-grant-agent-access
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_users.grant_agent_access_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants/{tenant_id}/users/{user_id}/agents/{agent_id}
            Method: POST

  AdminRevokeAgentAccessFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-revoke-agent-access
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_users.revoke_agent_access_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants/{tenant_id}/users/{user_id}/agents/{agent_id}
            Method: DELETE

  AdminListJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-list-jobs
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_jobs.list_jobs_admin_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/jobs
            Method: GET

  AdminListAgentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-list-agents
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_agents.list_agents_admin_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents
            Method: GET

  AdminCreateAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-create-agent
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_agents.create_agent_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents
            Method: POST

  AdminDeleteAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-delete-agent
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_agents.delete_agent_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents/{agent_id}
            Method: DELETE

  AdminGetAgentTagsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-get-agent-tags
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_agents.get_agent_tags_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents/{agent_id}/tags
            Method: GET

  AdminSetAgentTagsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-set-agent-tags
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_agents.set_agent_tags_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents/{agent_id}/tags
            Method: PUT

  AdminAddAgentTagsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-add-agent-tags
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_agents.add_agent_tags_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents/{agent_id}/tags
            Method: POST

  AdminRemoveAgentTagsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-remove-agent-tags
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_agents.remove_agent_tags_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents/{agent_id}/tags
            Method: DELETE

  AdminReissueInstallTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-reissue-install-token
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_agents.reissue_install_token_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents/{agent_id}/reissue-install-token
            Method: POST

  AdminGetPolicyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-get-policy
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_policy.get_policy_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents/{agent_id}/policy
            Method: GET

  AdminSetModeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-set-mode
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_policy.set_mode_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/agents/{agent_id}/policy/mode
            Method: PUT

  AdminListApprovalsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-list-approvals
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_approvals.list_approvals_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/approvals
            Method: GET

  AdminReviewApprovalFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-review-approval
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_approvals.review_approval_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/approvals/{approval_id}/{action}
            Method: PUT

  AdminPreApproveCommandFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-pre-approve-command
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_approvals.pre_approve_command_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/approvals
            Method: POST

  AdminDeleteApprovalFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-delete-approval
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_approvals.delete_approval_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/approvals/{approval_id}
            Method: DELETE

  # -----------------------------------------------------------------------
  # Heartbeat checker - runs every minute
  # -----------------------------------------------------------------------
  HeartbeatCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-heartbeat-checker
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.heartbeat.heartbeat_handler
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Name: reach-heartbeat-check
            Description: Mark agents INACTIVE if no heartbeat in last 90 seconds

Outputs:
  ApiUrl:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
