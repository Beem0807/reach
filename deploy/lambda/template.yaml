AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: reach backend

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    CodeUri: ../../backend
    Environment:
      Variables:
        TOKEN_PEPPER: !Ref TokenPepper
        SESSION_SIGNING_KEY: !Ref SessionSigningKey
        ADMIN_PASSWORD: !Ref AdminPassword
        STORAGE_BACKEND: dynamo
        RELEASES_S3_BASE: !Ref ReleasesS3Base
        AGENT_VERSION: !Ref AgentVersion
        CHART_VERSION: !Ref ChartVersion
        # Empty ReleasesChartRepo derives the repo from ReleasesS3Base rather than
        # setting an empty env var (which would override the backend's default).
        RELEASES_CHART_REPO: !If
          - HasChartRepo
          - !Ref ReleasesChartRepo
          - !Sub "${ReleasesS3Base}/charts/reach-agent"
        APPROVAL_RETENTION_DAYS: !Ref ApprovalRetentionDays
        JOB_RETENTION_DAYS: !Ref JobRetentionDays
        AUDIT_RETENTION_DAYS: !Ref AuditRetentionDays
        AGENT_HISTORY_RETENTION_DAYS: !Ref AgentHistoryRetentionDays
  HttpApi:
    CorsConfiguration:
      AllowMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      AllowHeaders:
        - Authorization
        - Content-Type
      AllowOrigins:
        - "*"

Parameters:
  TokenPepper:
    Type: String
    NoEcho: true
    Description: Server-side HMAC pepper for token hashing (permanent - never rotate)
  SessionSigningKey:
    Type: String
    NoEcho: true
    Description: HMAC key for signing tenant session (login) tokens. Safe to rotate - only forces re-login.
  AdminPassword:
    Type: String
    NoEcho: true
    Description: Password for the admin console (generates 8-hour session tokens on login)
  ReleasesS3Base:
    Type: String
    Default: "https://reach-releases.s3.amazonaws.com"
    Description: Base URL for agent binary downloads (override if self-hosting binaries)
  AgentVersion:
    Type: String
    Default: "latest"
    Description: Host agent release the generated host install command references (S3 path agent/<this>/install.sh). "latest" tracks the newest.
  ChartVersion:
    Type: String
    Default: ""
    Description: Pins the k8s Helm chart in the generated helm command (--version <this>). Empty installs the latest chart in the repo.
  ReleasesChartRepo:
    Type: String
    Default: ""
    Description: Helm chart repo URL for the generated k8s helm command. Empty derives it from ReleasesS3Base (<base>/charts/reach-agent).
  ApprovalRetentionDays:
    Type: Number
    Default: 7
    Description: Days to retain terminal approval records (denied, expired) before the daily cleanup deletes them
  JobRetentionDays:
    Type: Number
    Default: 7
    Description: Days to retain terminal job records (SUCCEEDED, FAILED, REJECTED, EXPIRED) before the daily cleanup deletes them
  AuditRetentionDays:
    Type: Number
    Default: 90
    Description: Days to retain audit log records before the daily cleanup deletes them
  AgentHistoryRetentionDays:
    Type: Number
    Default: 30
    Description: Days to retain agent heartbeat and status history records before the daily cleanup deletes them

Conditions:
  # Chart repo explicitly set vs. derived from ReleasesS3Base.
  HasChartRepo: !Not [!Equals [!Ref ReleasesChartRepo, ""]]

Resources:
  # -----------------------------------------------------------------------
  # DynamoDB tables
  # -----------------------------------------------------------------------
  AgentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-agents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: install_token_hash
          AttributeType: S
        - AttributeName: agent_token_hash
          AttributeType: S
      KeySchema:
        - AttributeName: agent_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: tenant-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        # Credential-only auth: agents are resolved by token hash, not agent_id.
        # The install token identifies the agent at claim, the agent token after.
        - IndexName: install-token-hash-index
          KeySchema:
            - AttributeName: install_token_hash
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: agent-token-hash-index
          KeySchema:
            - AttributeName: agent_token_hash
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  TenantsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-tenants
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH

  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: token_hash
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: token-hash-index
          KeySchema:
            - AttributeName: token_hash
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: tenant-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: tenant-username-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: username
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  JobsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: agent-status-index
          KeySchema:
            - AttributeName: agent_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: tenant-history-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ApprovalsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-approvals
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: approval_id
          AttributeType: S
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: approval_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: agent-approvals-index
          KeySchema:
            - AttributeName: agent_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: tenant-approvals-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ApiTokensTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-api-tokens
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token_id
          AttributeType: S
        - AttributeName: token_hash
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
      KeySchema:
        - AttributeName: token_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: token-hash-index
          KeySchema:
            - AttributeName: token_hash
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: user-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: tenant-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  AuditLogsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-audit-logs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: log_id
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: log_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: tenant-created-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AgentHistoryTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-agent-history
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: history_id
          AttributeType: S
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: history_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: agent-id-index
          KeySchema:
            - AttributeName: agent_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # -----------------------------------------------------------------------
  # Shared IAM role - all Lambda functions use this
  # -----------------------------------------------------------------------
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: reach-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: reach-dynamodb
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: dynamodb:*
                Resource:
                  - !GetAtt AgentsTable.Arn
                  - !GetAtt TenantsTable.Arn
                  - !GetAtt UsersTable.Arn
                  - !GetAtt JobsTable.Arn
                  - !GetAtt ApprovalsTable.Arn
                  - !GetAtt ApiTokensTable.Arn
                  - !GetAtt AuditLogsTable.Arn
                  - !GetAtt AgentHistoryTable.Arn
                  - !Sub "${AgentsTable.Arn}/index/*"
                  - !Sub "${UsersTable.Arn}/index/*"
                  - !Sub "${JobsTable.Arn}/index/*"
                  - !Sub "${ApprovalsTable.Arn}/index/*"
                  - !Sub "${ApiTokensTable.Arn}/index/*"
                  - !Sub "${AuditLogsTable.Arn}/index/*"
                  - !Sub "${TenantsTable.Arn}/index/*"
                  - !Sub "${AgentHistoryTable.Arn}/index/*"

  # -----------------------------------------------------------------------
  # Agent endpoints
  # -----------------------------------------------------------------------
  AgentClaimFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-agent-claim
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.agent_claim.agent_claim_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agent/claim
            Method: POST

  AgentSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-agent-sync
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.agent_sync.agent_sync_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agent/sync
            Method: POST

  AgentJobResultFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-agent-job-result
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.agent_job_result.agent_job_result_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agent/jobs/{job_id}/result
            Method: POST

  AgentRotateTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-agent-rotate-token
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.agent_rotate_token.agent_rotate_token_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /agent/rotate-token
            Method: POST

  # -----------------------------------------------------------------------
  # Tenant endpoints - job execution, agent lookup, approval checks (CLI)
  # -----------------------------------------------------------------------
  MeFunction:
