            Method: GET

  AdminDisableTenantFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-disable-tenant
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_tenants.disable_tenant_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants/{tenant_id}/disable
            Method: POST

  AdminEnableTenantFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-enable-tenant
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_tenants.enable_tenant_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants/{tenant_id}/enable
            Method: POST

  AdminCreateAdminUserFunction:
