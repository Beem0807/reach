      FunctionName: reach-admin-create-admin-user
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_tenants.create_admin_user_handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /admin/tenants/{tenant_id}/admin-users
            Method: POST

  AdminPlatformResetPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-admin-platform-reset-password
      Role: !GetAtt LambdaRole.Arn
      Handler: handlers.admin_tenants.platform_reset_password_handler
      Events:
        Api:
