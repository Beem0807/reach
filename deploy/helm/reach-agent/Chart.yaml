apiVersion: v2
name: reach-agent
description: >-
  Reach agent for Kubernetes - gives AI agents controlled, audited command
  execution against the cluster. Runs as a single logical agent (one identity
  per cluster) with leader election across replicas.
type: application
# Chart version - bump on chart changes.
version: 0.1.0
# Matches the reach-agent binary/image version this chart targets.
appVersion: "0.1.0"
keywords:
  - reach
  - agent
  - ai
  - remote-execution
home: https://github.com/nabeemdev/reach
sources:
  - https://github.com/nabeemdev/reach
# Per-version changelog (Artifact Hub convention). Update this on every chart
# release BEFORE running scripts/release_chart.sh - it travels inside the chart
# version, so `helm show chart reach/reach-agent --version <v>` shows what changed.
# kind is one of: added | changed | deprecated | removed | fixed | security
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: Initial reach-agent chart - one logical agent per cluster with leader election
