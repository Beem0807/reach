apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reach-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reach-agent.labels" . | nindent 4 }}
spec:
  # Fungible replicas; a Lease elects one active leader. Not a StatefulSet:
  # all replicas share ONE identity rather than each having a distinct one.
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "reach-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "reach-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- /* Names allow-listed by extraAllowedBinaries (dicts), and the full allow-list
             (extras + the replace-mode allowedBinaries) the initContainer must verify. */}}
      {{- $extraNames := list }}
      {{- range .Values.extraAllowedBinaries }}
      {{- $extraNames = append $extraNames (required "each extraAllowedBinaries entry needs a name" .name) }}
      {{- end }}
      {{- $allowNames := concat $extraNames (.Values.allowedBinaries | default list) | uniq }}
      serviceAccountName: {{ include "reach-agent.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $allowNames }}
      # Install each extraAllowedBinaries entry that carries a url into a shared volume on
      # the agent's PATH - no bespoke image, and the base image keeps updating (bump
      # image.tag; tools re-fetch). Each is pinned by url + sha256 (verified). Then VERIFY
      # every allow-listed binary resolves on PATH and hard-fail otherwise - so allow-listing
      # a binary you didn't provide crashes the pod here, not silently at approval/exec time.
      initContainers:
        - name: install-tools
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -eu
              dest=/opt/reach/bin
              export PATH="$dest:$PATH"
              {{- range .Values.extraAllowedBinaries }}
              {{- $name := required "each extraAllowedBinaries entry needs a name" .name }}
              {{- if .url }}
              echo "reach: installing {{ $name }}"
              wget -qO "$dest/.dl" {{ .url | quote }}
              echo {{ printf "%s  %s" (required (printf "extraAllowedBinaries %q has a url, so it needs a sha256" $name) .sha256) "$dest/.dl" | quote }} | sha256sum -c -
              {{- if .archivePath }}
              rm -rf "$dest/.x"; mkdir -p "$dest/.x"
              tar -xzf "$dest/.dl" -C "$dest/.x" {{ .archivePath | quote }}
              mv "$dest/.x/{{ .archivePath }}" "$dest/{{ $name }}"
              rm -rf "$dest/.x"
              {{- else }}
              mv "$dest/.dl" "$dest/{{ $name }}"
              {{- end }}
              chmod 0755 "$dest/{{ $name }}"
              rm -f "$dest/.dl"
              {{- end }}
              {{- end }}
              # Every allow-listed binary MUST be runnable (present != allowed, but allowed
              # must be present) - covers installed tools and image-baked ones alike.
              for bin in {{ $allowNames | join " " }}; do
                command -v "$bin" >/dev/null 2>&1 || { echo "reach: FATAL '$bin' is allow-listed but not found on PATH - give it a url+sha256 in extraAllowedBinaries, or bake it into the image"; exit 1; }
              done
              echo "reach: allowlist verified:" {{ $allowNames | join " " | quote }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.extraAllowedBinaries }}
          volumeMounts:
            - name: reach-bin
              mountPath: /opt/reach/bin
          {{- end }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- if .Values.extraAllowedBinaries }}
            # Put initContainer-installed tools (helm/flux/…) ahead of the image's PATH.
            - name: PATH
              value: "/opt/reach/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            {{- end }}
            # --- claim bootstrap (from the tenant console) ---
            - name: REACH_API_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "reach-agent.bootstrapSecretName" . }}
                  key: api-url
            - name: REACH_INSTALL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "reach-agent.bootstrapSecretName" . }}
                  key: install-token
            # --- kubernetes mode (auto-detected; these name the resources it manages) ---
            - name: REACH_K8S_TOKEN_SECRET
              value: {{ include "reach-agent.tokenSecretName" . | quote }}
            - name: REACH_K8S_LEASE
              value: {{ include "reach-agent.leaseName" . | quote }}
            - name: REACH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REACH_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- with .Values.allowedBinaries }}
            # Replaces the default allowlist (lock-down). Jobs run without a shell.
            - name: REACH_K8S_ALLOWED_BINARIES
              value: {{ join "," . | quote }}
            {{- end }}
            {{- if $extraNames }}
            # Added to the default allowlist (kubectl + filters are kept). Names only; the
            # initContainer installs any that carry a url and verifies they resolve.
            - name: REACH_K8S_EXTRA_BINARIES
              value: {{ join "," $extraNames | quote }}
            {{- end }}
            {{- with .Values.permissionReviewIntervalSeconds }}
            - name: REACH_K8S_REVIEW_INTERVAL_SECONDS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.commandTimeoutSeconds }}
            - name: REACH_COMMAND_TIMEOUT_SECONDS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.maxOutputBytes }}
            - name: REACH_MAX_OUTPUT_BYTES
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.livenessProbe.enabled }}
            - name: REACH_HEALTH_FILE
              value: /tmp/healthy
            {{- end }}
            {{- if .Values.metrics.enabled }}
            # Opt-in Prometheus endpoint. This is the agent's ONLY inbound port -
            # keep it locked down with the NetworkPolicy (metrics.networkPolicy).
            - name: REACH_METRICS_ADDR
              value: ":{{ .Values.metrics.port }}"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          # The agent has no server; it touches /tmp/healthy each poll iteration.
          # If the loop wedges, the file goes stale and the pod is restarted.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'test $(( $(date +%s) - $(stat -c %Y /tmp/healthy 2>/dev/null || echo 0) )) -lt {{ .Values.livenessProbe.staleSeconds }}'
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            # kubectl writes its discovery cache under $HOME (/tmp); back it with
            # an emptyDir so the read-only root filesystem stays read-only.
            - name: tmp
              mountPath: /tmp
            {{- if .Values.extraAllowedBinaries }}
            # initContainer-installed tools, read-only for the agent (it only execs them).
            - name: reach-bin
              mountPath: /opt/reach/bin
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.extraAllowedBinaries }}
        - name: reach-bin
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
