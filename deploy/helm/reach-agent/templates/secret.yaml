{{- if not .Values.reach.existingSecret }}
{{- if not .Values.reach.apiUrl }}{{ fail "reach.apiUrl is required (or set reach.existingSecret)" }}{{- end }}
{{- if not .Values.reach.installToken }}{{ fail "reach.installToken is required on first install (or set reach.existingSecret)" }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reach-agent.bootstrapSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reach-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-url: {{ .Values.reach.apiUrl | quote }}
  install-token: {{ .Values.reach.installToken | quote }}
{{- end }}
