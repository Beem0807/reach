# Local dev stack for Reach: Postgres + backend (runs migrations) + nginx, with an
# optional one-shot `seed` service that loads dummy data. Served on
# http://localhost:8080 (web UI at /ui).
#
#   Bring it ALL up (build + start + seed dummy data):
#     docker compose --profile seed up -d --build
#
#   Take it ALL down (containers, network, AND the Postgres volume - wipes data):
#     docker compose --profile seed down -v
#
# Seeds three primary tenants you log into - "alpha", "beta", and "gamma" - each with
# the same logins (username == password): localadmin / localoperator / localdeveloper.
# It also creates a disabled "delta", a "scale" tenant, and SEED_BULK_TENANTS (default 25)
# bulk tenants so the platform-admin views have realistic volume.
# Platform-admin login uses ADMIN_PASSWORD (default "localadmin").
# Re-run `docker compose run --rm seed` any time to reset the seed data.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reach
      POSTGRES_PASSWORD: reach
      POSTGRES_DB: reach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reach"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      TOKEN_PEPPER: ${TOKEN_PEPPER:-localtest}
      SESSION_SIGNING_KEY: ${SESSION_SIGNING_KEY:-localsigning}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-localadmin}
      DATABASE_URL: postgresql://reach:reach@db:5432/reach
      STORAGE_BACKEND: postgres
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-90}
    depends_on:
      db:
        condition: service_healthy

  seed:
    build: .
    command: python /scripts/seed.py
    environment:
      TOKEN_PEPPER: ${TOKEN_PEPPER:-localtest}
      DATABASE_URL: postgresql://reach:reach@db:5432/reach
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      backend:
        condition: service_started
    profiles:
      - seed

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
