services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reach
      POSTGRES_PASSWORD: reach
      POSTGRES_DB: reach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reach"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      TOKEN_PEPPER: ${TOKEN_PEPPER:-localtest}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-localadmin}
      DATABASE_URL: postgresql://reach:reach@db:5432/reach
      APPROVAL_RETENTION_DAYS: ${APPROVAL_RETENTION_DAYS:-7}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
