AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: reach backend

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256

Parameters:
  TokenPepper:
    Type: String
    NoEcho: true
    Description: Server-side HMAC pepper for token hashing

Resources:
  # -----------------------------------------------------------------------
  # DynamoDB tables
  # -----------------------------------------------------------------------
  AgentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-agents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
      KeySchema:
        - AttributeName: agent_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: tenant-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  TenantTokensTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-tenant-tokens
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token_hash
          AttributeType: S
      KeySchema:
        - AttributeName: token_hash
          KeyType: HASH

  JobsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: reach-jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: agent-status-index
          KeySchema:
            - AttributeName: agent_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: tenant-history-index
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # -----------------------------------------------------------------------
  # API Lambda
  # -----------------------------------------------------------------------
  ReachFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-api
      CodeUri: .
      Handler: app.lambda_handler
      Environment:
        Variables:
          TOKEN_PEPPER: !Ref TokenPepper
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TenantTokensTable
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        # GSI query permissions — DynamoDBCrudPolicy only covers the table ARN
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource:
                - !Sub "${JobsTable.Arn}/index/agent-status-index"
                - !Sub "${JobsTable.Arn}/index/tenant-history-index"
                - !Sub "${AgentsTable.Arn}/index/tenant-index"
      Events:
        AgentClaim:
          Type: HttpApi
          Properties:
            Path: /agent/claim
            Method: POST
        AgentSync:
          Type: HttpApi
          Properties:
            Path: /agent/sync
            Method: POST
        AgentJobResult:
          Type: HttpApi
          Properties:
            Path: /agent/jobs/{job_id}/result
            Method: POST
        CreateJob:
          Type: HttpApi
          Properties:
            Path: /jobs
            Method: POST
        GetJob:
          Type: HttpApi
          Properties:
            Path: /jobs/{job_id}
            Method: GET
        GetAgent:
          Type: HttpApi
          Properties:
            Path: /agents/{agent_id}
            Method: GET
        ListAgents:
          Type: HttpApi
          Properties:
            Path: /agents
            Method: GET
        ListJobs:
          Type: HttpApi
          Properties:
            Path: /jobs
            Method: GET

  # -----------------------------------------------------------------------
  # Heartbeat checker — runs every 5 minutes
  # -----------------------------------------------------------------------
  HeartbeatCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: reach-heartbeat-checker
      CodeUri: .
      Handler: app.heartbeat_handler
      Environment:
        Variables:
          TOKEN_PEPPER: !Ref TokenPepper
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentsTable
      Events:
        HeartbeatSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Name: reach-heartbeat-check
            Description: Mark agents INACTIVE if no heartbeat in last 5 minutes

Outputs:
  ApiUrl:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
